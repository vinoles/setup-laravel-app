[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:octane]
command=/usr/bin/php -d variables_order=EGPCS /var/www/html/artisan octane:start --watch --host=0.0.0.0 --port=80
user=sail
environment=LARAVEL_SAIL="1"
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/octane.log
stdout_logfile_maxbytes=0

[program:reverb]
command=/usr/bin/php /var/www/html/artisan reverb:start --debug
minfds=10000
numprocs=1
autostart=true
autorestart=true
user=sail
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/reverb.log

[program:horizon]
command=/usr/bin/php /var/www/html/artisan horizon
autostart=true
autorestart=true
stopwaitsecs=360
user=sail
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/horizon.log

[program:cron]
command=/usr/sbin/cron -f -l 8
autostart=true
stdout_logfile=/var/www/html/storage/logs/cron.out.log
stderr_logfile=/var/www/html/storage/logs/cron.err.log
